global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    host: flash
    monitor: oneflow

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
        labels: { instance: flash }

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
        labels: { instance: flash }
