global:
  resolve_timeout: 5m

route:
  receiver: ntfy-default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 6h
  routes:
    - matchers: [severity="critical"]
      receiver: ntfy-critical
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: ntfy-default
    webhook_configs:
      - url: http://172.30.0.1:9094/alert
        send_resolved: true
        max_alerts: 0
        http_config:
          enable_http2: false

  - name: ntfy-critical
    webhook_configs:
      - url: http://172.30.0.1:9094/alert
        send_resolved: true
        max_alerts: 0
        http_config:
          enable_http2: false

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, instance]
